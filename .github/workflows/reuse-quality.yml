name: Quality checks

on:
  workflow_call:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout git repository
      uses: actions/checkout@v4

    - uses: actions/setup-node@v3
      with:
        node-version: 24
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build types
      run: npm run build-types

    - name: Build UI
      run: npm -w ui run build

    - name: Type check
      run: npm run check-types

    - name: Init .env
      run: ./dev/init-env.sh

    - name: Use localhost as DEV_HOST in CI
      run: sed -i 's/^DEV_HOST=.*/DEV_HOST=localhost/' .env

    - name: Start test services
      run: npm run test-deps

    - name: Start dev API
      run: NODE_CONFIG_DIR=./api/config/ NODE_ENV=test dotenv -- npm -w api run dev &

    - name: Wait for API to be ready
      run: |
        for i in $(seq 1 30); do
          curl -s http://localhost:$(grep DEV_API_PORT .env | cut -d= -f2)/api/ping && break
          sleep 2
        done

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run tests
      run: NODE_CONFIG_DIR=./api/config/ NODE_ENV=test EVENTS_LOG_LEVEL=alert playwright test --max-failures=1

    - name: Audit
      run: npm audit --omit=dev --audit-level=critical

    - name: Stop test services
      if: always()
      run: docker compose --profile test down
